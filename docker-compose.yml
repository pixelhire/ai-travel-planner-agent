version: "3.9"

# run the project : docker compose up --build

services:
  research-agent:
    # build: . This is shortcut of below build code
    build:
      context: .
      dockerfile: Dockerfile

    container_name: ai-travel-palnner-agent

    ports:
      - "8000:8000"

    env_file:
      - backend/.env

    volumes:
      - ./data:/app/data
      - ../.secrets:/app/.secrets

    restart: unless-stopped

    command: >
      uvicorn backend.main:app
      --host 0.0.0.0
      --port 8000
